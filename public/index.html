<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HoloSpec Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111a;
        --panel: rgba(17, 28, 41, 0.86);
        --line: rgba(148, 163, 184, 0.24);
        --text: #e2e8f0;
        --muted: #93a4b8;
        --accent: #5eead4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Avenir Next", sans-serif;
        background:
          radial-gradient(circle at top, rgba(94, 234, 212, 0.18), transparent 32%),
          linear-gradient(180deg, #09111a 0%, #05080d 100%);
        color: var(--text);
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 32px auto;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.2rem);
        letter-spacing: -0.04em;
      }

      .muted {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      canvas,
      img {
        width: 100%;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      dl {
        margin: 0;
        display: grid;
        gap: 8px;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel hero">
        <div>
          <p class="muted">WebSocket subscriber</p>
          <h1>HoloSpec Relay Viewer</h1>
        </div>
        <div>
          <p id="status">Connecting...</p>
          <p class="muted" id="stream-meta">Waiting for frames</p>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Color</h2>
          <p class="muted">JPEG stream from the iOS publisher</p>
          <img id="color-frame" alt="Latest color frame" />
        </article>

        <article class="panel">
          <h2>Depth</h2>
          <p class="muted">Float32 depth map normalized for preview</p>
          <canvas id="depth-canvas"></canvas>
        </article>
      </section>

      <section class="panel">
        <dl>
          <dt>Latest stream</dt>
          <dd id="stream-id">None</dd>
          <dt>Frame timestamp</dt>
          <dd id="timestamp">-</dd>
          <dt>Color size</dt>
          <dd id="color-size">-</dd>
          <dt>Depth size</dt>
          <dd id="depth-size">-</dd>
        </dl>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const streamMetaEl = document.getElementById("stream-meta");
      const streamIdEl = document.getElementById("stream-id");
      const timestampEl = document.getElementById("timestamp");
      const colorSizeEl = document.getElementById("color-size");
      const depthSizeEl = document.getElementById("depth-size");
      const colorFrameEl = document.getElementById("color-frame");
      const depthCanvas = document.getElementById("depth-canvas");
      const depthContext = depthCanvas.getContext("2d");
      const FRAME_MAGIC = "HSF1";
      const FIXED_HEADER_LENGTH = 80;
      const DEPTH_PREVIEW_NEAR_METERS = 0.2;
      const DEPTH_PREVIEW_FAR_METERS = 1.2;
      const MAX_REASONABLE_DEPTH_METERS = 2.0;
      let currentColorUrl = null;
      let latestFrame = null;
      let renderScheduled = false;

      function base64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes.buffer;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function bytesToString(bytes) {
        let result = "";
        for (let index = 0; index < bytes.length; index += 1) {
          result += String.fromCharCode(bytes[index]);
        }
        return result;
      }

      function turboColor(normalized) {
        const x = clamp(normalized, 0, 1);
        const red = 34.61 + x * (1172.33 + x * (-10793.56 + x * (33300.12 + x * (-38394.49 + x * 14825.05))));
        const green = 23.31 + x * (557.33 + x * (1225.33 + x * (-3574.96 + x * (2036.17 + x * -376.04))));
        const blue = 27.2 + x * (3211.1 + x * (-15327.97 + x * (27814.0 + x * (-22569.18 + x * 6838.66))));

        return [
          Math.round(clamp(red, 0, 255)),
          Math.round(clamp(green, 0, 255)),
          Math.round(clamp(blue, 0, 255))
        ];
      }

      function parseBinaryFrame(buffer) {
        const view = new DataView(buffer);
        const magicBytes = new Uint8Array(buffer, 0, 4);
        const magic = bytesToString(magicBytes);
        if (magic !== FRAME_MAGIC) {
          return null;
        }

        const version = view.getUint8(4);
        const messageType = view.getUint8(5);
        const headerLength = view.getUint16(6, true);
        const timestamp = view.getFloat64(8, true);
        const colorWidth = view.getUint16(16, true);
        const colorHeight = view.getUint16(18, true);
        const depthWidth = view.getUint16(20, true);
        const depthHeight = view.getUint16(22, true);
        const depthBytesPerRow = view.getUint32(24, true);
        const colorLength = view.getUint32(28, true);
        const depthLength = view.getUint32(32, true);
        const streamIdLength = view.getUint16(36, true);

        if (version !== 1 || messageType !== 1 || headerLength !== FIXED_HEADER_LENGTH + streamIdLength) {
          return null;
        }

        if (buffer.byteLength !== headerLength + colorLength + depthLength) {
          return null;
        }

        const streamIdBytes = new Uint8Array(buffer, FIXED_HEADER_LENGTH, streamIdLength);
        const streamId = bytesToString(streamIdBytes) || "default";
        const colorBytes = new Uint8Array(buffer, headerLength, colorLength);
        const depthBytes = new Uint8Array(buffer, headerLength + colorLength, depthLength);

        return {
          streamId,
          timestamp,
          color: {
            width: colorWidth,
            height: colorHeight,
            bytes: colorBytes
          },
          depth: {
            width: depthWidth,
            height: depthHeight,
            bytesPerRow: depthBytesPerRow,
            bytes: depthBytes
          }
        };
      }

      function renderDepthFrame(width, height, bytesPerRow, bytes) {
        const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
        const imageData = new ImageData(width, height);
        let min = Number.POSITIVE_INFINITY;
        let max = 0;
        let validPixels = 0;
        const totalPixels = width * height;

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const offset = y * bytesPerRow + x * 4;
            const value = view.getFloat32(offset, true);
            if (Number.isFinite(value) && value > 0 && value < MAX_REASONABLE_DEPTH_METERS) {
              min = Math.min(min, value);
              max = Math.max(max, value);
              validPixels += 1;
            }
          }
        }
        const validRatio = validPixels / totalPixels;
        const displayRange = DEPTH_PREVIEW_FAR_METERS - DEPTH_PREVIEW_NEAR_METERS;

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const sourceOffset = y * bytesPerRow + x * 4;
            const pixelIndex = y * width + x;
            const value = view.getFloat32(sourceOffset, true);
            const invalid = !Number.isFinite(value) || value <= 0 || value >= MAX_REASONABLE_DEPTH_METERS;

            if (invalid) {
              imageData.data[pixelIndex * 4 + 0] = 8;
              imageData.data[pixelIndex * 4 + 1] = 10;
              imageData.data[pixelIndex * 4 + 2] = 18;
              imageData.data[pixelIndex * 4 + 3] = 255;
              continue;
            }

            const normalized = 1 - clamp(
              (value - DEPTH_PREVIEW_NEAR_METERS) / Math.max(displayRange, 0.0001),
              0,
              1
            );
            const [red, green, blue] = turboColor(normalized);

            imageData.data[pixelIndex * 4 + 0] = red;
            imageData.data[pixelIndex * 4 + 1] = green;
            imageData.data[pixelIndex * 4 + 2] = blue;
            imageData.data[pixelIndex * 4 + 3] = 255;
          }
        }

        depthCanvas.width = width;
        depthCanvas.height = height;
        depthContext.putImageData(imageData, 0, 0);

        return {
          validRatio,
          minDepth: Number.isFinite(min) ? min : null,
          maxDepth: max > 0 ? max : null
        };
      }

      function setColorFrameFromBytes(bytes) {
        if (currentColorUrl) {
          URL.revokeObjectURL(currentColorUrl);
        }

        const blob = new Blob([bytes], { type: "image/jpeg" });
        currentColorUrl = URL.createObjectURL(blob);
        colorFrameEl.src = currentColorUrl;
      }

      function setColorFrameFromBase64(base64) {
        if (currentColorUrl) {
          URL.revokeObjectURL(currentColorUrl);
          currentColorUrl = null;
        }

        colorFrameEl.src = `data:image/jpeg;base64,${base64}`;
      }

      function updateFrameMetadata(streamId, timestamp, colorWidth, colorHeight, depthWidth, depthHeight, depthStats) {
        const depthSummary = depthStats.minDepth === null
          ? "no valid depth"
          : `${depthStats.minDepth.toFixed(2)}-${depthStats.maxDepth.toFixed(2)}m`;
        const latencyMs = Math.max(0, Math.round(Date.now() - timestamp * 1000));

        streamMetaEl.textContent = `Viewer lag: ${latencyMs}ms`;
        streamIdEl.textContent = streamId;
        timestampEl.textContent = new Date(timestamp * 1000).toLocaleString();
        colorSizeEl.textContent = `${colorWidth} x ${colorHeight}`;
        depthSizeEl.textContent =
          `${depthWidth} x ${depthHeight} • valid ${(depthStats.validRatio * 100).toFixed(1)}% • ${depthSummary}`;
      }

      function renderJsonFrame(message) {
        if (!message.color || !message.depth) {
          return;
        }

        const depthBytes = new Uint8Array(base64ToArrayBuffer(message.depth.data));
        const depthStats = renderDepthFrame(
          message.depth.width,
          message.depth.height,
          message.depth.bytesPerRow,
          depthBytes
        );

        setColorFrameFromBase64(message.color.data);
        updateFrameMetadata(
          message.streamId || "default",
          message.timestamp,
          message.color.width,
          message.color.height,
          message.depth.width,
          message.depth.height,
          depthStats
        );
      }

      function renderBinaryFrame(buffer) {
        const frame = parseBinaryFrame(buffer);
        if (!frame) {
          return;
        }

        const depthStats = renderDepthFrame(
          frame.depth.width,
          frame.depth.height,
          frame.depth.bytesPerRow,
          frame.depth.bytes
        );

        setColorFrameFromBytes(frame.color.bytes);
        updateFrameMetadata(
          frame.streamId,
          frame.timestamp,
          frame.color.width,
          frame.color.height,
          frame.depth.width,
          frame.depth.height,
          depthStats
        );
      }

      function scheduleRender() {
        if (renderScheduled) {
          return;
        }

        renderScheduled = true;
        requestAnimationFrame(() => {
          renderScheduled = false;
          const frame = latestFrame;
          latestFrame = null;

          if (!frame) {
            return;
          }

          if (frame.kind === "json") {
            renderJsonFrame(frame.message);
          } else {
            renderBinaryFrame(frame.buffer);
          }

          if (latestFrame) {
            scheduleRender();
          }
        });
      }

      const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${wsProtocol}://${location.host}/ws?role=subscriber`);
      socket.binaryType = "arraybuffer";

      socket.addEventListener("open", () => {
        statusEl.textContent = "Connected";
        socket.send(JSON.stringify({ type: "hello", role: "subscriber" }));
      });

      socket.addEventListener("close", () => {
        statusEl.textContent = "Disconnected";
      });

      socket.addEventListener("message", ({ data }) => {
        if (typeof data !== "string") {
          latestFrame = { kind: "binary", buffer: data };
          scheduleRender();
          return;
        }

        const message = JSON.parse(data);
        if (message.type === "frame") {
          latestFrame = { kind: "json", message };
          scheduleRender();
          return;
        }

        if (message.type === "hello_ack") {
          statusEl.textContent = `Subscribed (${message.activeStreams.length} streams cached)`;
        }
      });
    </script>
  </body>
</html>
